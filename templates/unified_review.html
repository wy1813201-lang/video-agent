<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI短剧 - 内容审查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab.active {
            background: white;
            color: #667eea;
        }

        .content-section {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .content-section.active {
            display: block;
        }

        .section-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        /* 人物母版样式 */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .character-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }

        .character-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .character-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #e0e0e0;
        }

        .character-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .character-desc {
            color: #666;
            line-height: 1.6;
            font-size: 0.95em;
        }

        /* 视频进度样式 */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid #e0e0e0;
        }

        .video-preview {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #000;
        }

        .video-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .video-id {
            font-weight: 600;
            color: #333;
        }

        .video-status {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-completed {
            background: #4caf50;
            color: white;
        }

        .status-processing {
            background: #ff9800;
            color: white;
        }

        .status-pending {
            background: #9e9e9e;
            color: white;
        }

        /* 最终视频样式 */
        .final-video-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .final-video {
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .video-metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .metadata-item {
            text-align: center;
        }

        .metadata-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .metadata-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        /* 反馈区域 */
        .feedback-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .feedback-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 15px;
        }

        .feedback-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        .feedback-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-approve {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
        }

        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-reject {
            background: linear-gradient(135deg, #f44336 0%, #e53935 100%);
            color: white;
        }

        .btn-reject:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 50px;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            margin-top: 20px;
            animation: slideIn 0.5s;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge-character {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-video {
            background: #fff3e0;
            color: #f57c00;
        }

        .badge-final {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        /* 剧本审查样式 */
        .script-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .script-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            white-space: pre-wrap;
            font-family: "Courier New", monospace;
            font-size: 0.95em;
            line-height: 1.8;
            color: #333;
            max-height: 500px;
            overflow-y: auto;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .score-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #e0e0e0;
        }

        .score-item.good {
            border-color: #4caf50;
            background: #f1f8f4;
        }

        .score-item.warning {
            border-color: #ff9800;
            background: #fff8f0;
        }

        .score-item.bad {
            border-color: #f44336;
            background: #fef5f5;
        }

        .score-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .score-status {
            margin-top: 5px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .score-status.pass {
            color: #4caf50;
        }

        .score-status.fail {
            color: #f44336;
        }

        .badge-script {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 AI短剧内容审查</h1>
            <p class="subtitle" id="reviewType">加载中...</p>
        </div>

        <div id="loading" class="loading">
            加载审查内容...
        </div>

        <div id="content" style="display: none;">
            <!-- 标签页 -->
            <div class="tabs" id="tabs" style="display: none;">
                <button class="tab active" onclick="switchTab('script')">
                    📝 剧本审查 <span class="badge badge-script" id="scriptBadge">1</span>
                </button>
                <button class="tab" onclick="switchTab('characters')">
                    👥 人物母版 <span class="badge badge-character" id="charCount">0</span>
                </button>
                <button class="tab" onclick="switchTab('videos')">
                    🎥 视频片段 <span class="badge badge-video" id="videoCount">0</span>
                </button>
                <button class="tab" onclick="switchTab('final')">
                    ✨ 最终视频 <span class="badge badge-final">1</span>
                </button>
            </div>

            <!-- 剧本审查 -->
            <div id="script-section" class="content-section active">
                <h2 class="section-title">📝 剧本审查</h2>
                <div id="scriptContainer" class="script-container">
                    <!-- 动态生成 -->
                </div>
                <div id="scriptEmpty" class="empty-state" style="display: none;">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无剧本数据</p>
                </div>
            </div>

            <!-- 人物母版 -->
            <div id="characters-section" class="content-section active">
                <h2 class="section-title">👥 人物母版审查</h2>
                <div id="charactersGrid" class="characters-grid">
                    <!-- 动态生成 -->
                </div>
                <div id="charactersEmpty" class="empty-state" style="display: none;">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无人物母版数据</p>
                </div>
            </div>

            <!-- 视频片段 -->
            <div id="videos-section" class="content-section">
                <h2 class="section-title">🎥 视频片段审查</h2>
                <div id="videosGrid" class="videos-grid">
                    <!-- 动态生成 -->
                </div>
                <div id="videosEmpty" class="empty-state" style="display: none;">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无视频片段数据</p>
                </div>
            </div>

            <!-- 最终视频 -->
            <div id="final-section" class="content-section">
                <h2 class="section-title">✨ 最终视频审查</h2>
                <div id="finalVideoContainer" class="final-video-container">
                    <!-- 动态生成 -->
                </div>
                <div id="finalEmpty" class="empty-state" style="display: none;">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无最终视频数据</p>
                </div>
            </div>

            <!-- 反馈区域 -->
            <div class="feedback-section">
                <h3 class="feedback-title">📝 审查反馈</h3>
                <textarea
                    id="feedbackInput"
                    class="feedback-input"
                    placeholder="请输入审查意见（可选）&#10;例如：&#10;- 人物形象符合预期&#10;- 第3个镜头需要调整&#10;- 整体效果良好"
                ></textarea>
                <div class="button-group">
                    <button class="btn btn-reject" onclick="submitReview('rejected')">
                        ❌ 不通过
                    </button>
                    <button class="btn btn-approve" onclick="submitReview('approved')">
                        ✅ 通过
                    </button>
                </div>
            </div>

            <div id="successMessage" style="display: none;" class="success-message">
                ✓ 审查已提交！页面将自动关闭...
            </div>
        </div>
    </div>

    <script>
        let reviewData = null;

        // 加载审查数据
        async function loadReviewData() {
            try {
                const response = await fetch('/api/review_data');
                reviewData = await response.json();

                if (!reviewData || !reviewData.type) {
                    document.getElementById('loading').textContent = '没有待审查的内容';
                    return;
                }

                renderReviewContent();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('loading').textContent = '加载失败，请刷新页面重试';
            }
        }

        // 渲染审查内容
        function renderReviewContent() {
            const type = reviewData.type;

            // 更新标题
            const titles = {
                'script': '剧本审查',
                'character': '人物母版审查',
                'video_progress': '视频生成进度审查',
                'final_video': '最终视频审查',
                'all': '完整内容审查'
            };
            document.getElementById('reviewType').textContent = titles[type] || '内容审查';

            // 根据类型显示不同内容
            if (type === 'all') {
                // 显示所有标签页
                document.getElementById('tabs').style.display = 'flex';
                renderScript();
                renderCharacters();
                renderVideos();
                renderFinalVideo();
            } else if (type === 'script') {
                renderScript();
                document.getElementById('script-section').classList.add('active');
            } else if (type === 'character') {
                renderCharacters();
                document.getElementById('characters-section').classList.add('active');
                document.getElementById('script-section').classList.remove('active');
            } else if (type === 'video_progress') {
                renderVideos();
                document.getElementById('videos-section').classList.add('active');
                document.getElementById('script-section').classList.remove('active');
            } else if (type === 'final_video') {
                renderFinalVideo();
                document.getElementById('final-section').classList.add('active');
                document.getElementById('script-section').classList.remove('active');
            }

            // 更新计数
            document.getElementById('charCount').textContent = reviewData.characters?.length || 0;
            document.getElementById('videoCount').textContent = reviewData.videos?.length || 0;
        }

        // 渲染剧本
        function renderScript() {
            const script = reviewData.script;
            const score = reviewData.script_score;
            const container = document.getElementById('scriptContainer');
            const empty = document.getElementById('scriptEmpty');

            if (!script) {
                container.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            let html = '<div class="script-content">' + script + '</div>';

            // 如果有评分，显示评分
            if (score) {
                html += '<div class="score-grid">';

                if (score.overall !== undefined) {
                    const overallClass = score.overall >= 8.5 ? 'good' : score.overall >= 7.0 ? 'warning' : 'bad';
                    html += `
                        <div class="score-item ${overallClass}">
                            <div class="score-label">总分</div>
                            <div class="score-value">${score.overall.toFixed(1)}</div>
                            <div class="score-status ${score.overall >= 8.5 ? 'pass' : 'fail'}">
                                ${score.overall >= 8.5 ? '✓ 达标' : '✗ 未达标'}
                            </div>
                        </div>
                    `;
                }

                if (score.hook_strength !== undefined) {
                    const hookClass = score.hook_strength >= 8.5 ? 'good' : score.hook_strength >= 7.0 ? 'warning' : 'bad';
                    html += `
                        <div class="score-item ${hookClass}">
                            <div class="score-label">Hook吸引力</div>
                            <div class="score-value">${score.hook_strength.toFixed(1)}</div>
                            <div class="score-status ${score.hook_strength >= 8.5 ? 'pass' : 'fail'}">
                                ${score.hook_strength >= 8.5 ? '✓ 达标' : '✗ 未达标'}
                            </div>
                        </div>
                    `;
                }

                if (score.plot_structure !== undefined) {
                    const plotClass = score.plot_structure >= 8.5 ? 'good' : score.plot_structure >= 7.0 ? 'warning' : 'bad';
                    html += `
                        <div class="score-item ${plotClass}">
                            <div class="score-label">剧情结构</div>
                            <div class="score-value">${score.plot_structure.toFixed(1)}</div>
                            <div class="score-status ${score.plot_structure >= 8.5 ? 'pass' : 'fail'}">
                                ${score.plot_structure >= 8.5 ? '✓ 达标' : '✗ 未达标'}
                            </div>
                        </div>
                    `;
                }

                if (score.emotion_rhythm !== undefined) {
                    const emotionClass = score.emotion_rhythm >= 8.5 ? 'good' : score.emotion_rhythm >= 7.0 ? 'warning' : 'bad';
                    html += `
                        <div class="score-item ${emotionClass}">
                            <div class="score-label">情绪节奏</div>
                            <div class="score-value">${score.emotion_rhythm.toFixed(1)}</div>
                            <div class="score-status ${score.emotion_rhythm >= 8.5 ? 'pass' : 'fail'}">
                                ${score.emotion_rhythm >= 8.5 ? '✓ 达标' : '✗ 未达标'}
                            </div>
                        </div>
                    `;
                }

                html += '</div>';
            }

            container.innerHTML = html;
        }

        // 渲染人物母版
        function renderCharacters() {
            const characters = reviewData.characters || [];
            const grid = document.getElementById('charactersGrid');
            const empty = document.getElementById('charactersEmpty');

            if (characters.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.innerHTML = '';
            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.innerHTML = `
                    <img src="/api/image/${encodeURIComponent(char.image_path)}"
                         class="character-image"
                         alt="${char.name}"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22><rect fill=%22%23ddd%22 width=%22300%22 height=%22300%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2220%22>图片加载失败</text></svg>'">
                    <div class="character-name">${char.name}</div>
                    <div class="character-desc">${char.description || '暂无描述'}</div>
                `;
                grid.appendChild(card);
            });
        }

        // 渲染视频片段
        function renderVideos() {
            const videos = reviewData.videos || [];
            const grid = document.getElementById('videosGrid');
            const empty = document.getElementById('videosEmpty');

            if (videos.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.innerHTML = '';
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';

                const statusClass = video.status === 'completed' ? 'status-completed' :
                                  video.status === 'processing' ? 'status-processing' : 'status-pending';
                const statusText = video.status === 'completed' ? '已完成' :
                                 video.status === 'processing' ? '生成中' : '待生成';

                card.innerHTML = `
                    <video class="video-preview" controls>
                        <source src="/api/video/${encodeURIComponent(video.video_path)}" type="video/mp4">
                        您的浏览器不支持视频播放
                    </video>
                    <div class="video-info">
                        <span class="video-id">${video.shot_id}</span>
                        <span class="video-status ${statusClass}">${statusText}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 渲染最终视频
        function renderFinalVideo() {
            const videoPath = reviewData.final_video_path;
            const metadata = reviewData.metadata || {};
            const container = document.getElementById('finalVideoContainer');
            const empty = document.getElementById('finalEmpty');

            if (!videoPath) {
                container.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            container.innerHTML = `
                <video class="final-video" controls autoplay>
                    <source src="/api/video/${encodeURIComponent(videoPath)}" type="video/mp4">
                    您的浏览器不支持视频播放
                </video>
                <div class="video-metadata">
                    <div class="metadata-item">
                        <div class="metadata-label">时长</div>
                        <div class="metadata-value">${metadata.duration || '-'}</div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">分辨率</div>
                        <div class="metadata-value">${metadata.resolution || '-'}</div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">文件大小</div>
                        <div class="metadata-value">${metadata.file_size || '-'}</div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">帧率</div>
                        <div class="metadata-value">${metadata.fps || '-'}</div>
                    </div>
                </div>
            `;
        }

        // 切换标签页
        function switchTab(tab) {
            // 更新标签按钮
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // 更新内容区域
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${tab}-section`).classList.add('active');
        }

        // 提交审查
        async function submitReview(status) {
            const feedback = document.getElementById('feedbackInput').value.trim();

            try {
                const response = await fetch('/api/submit_review', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        status: status,
                        feedback: feedback
                    })
                });

                if (response.ok) {
                    document.getElementById('content').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';

                    // 3秒后提示可以关闭
                    setTimeout(() => {
                        document.getElementById('successMessage').innerHTML += '<br><br>你可以关闭此窗口了';
                    }, 3000);
                } else {
                    alert('提交失败，请重试');
                }
            } catch (error) {
                console.error('提交失败:', error);
                alert('提交失败，请重试');
            }
        }

        // 页面加载时获取数据
        window.onload = loadReviewData;
    </script>
</body>
</html>
